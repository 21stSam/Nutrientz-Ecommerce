{% if cart %}
    <div id="cart-items-list">
        {% for item in cart %}
            <div class="d-flex align-items-center mb-3 pb-3 border-bottom">
                <div class="flex-grow-1">
                    <h6 class="mb-0 small fw-bold">{{ item.product.name }}</h6>
                    <small class="text-muted">{{ item.quantity }} x KES {{ item.price }}</small>
                </div>
                <div class="fw-bold text-primary">KES {{ item.total_price }}</div>
            </div>
        {% endfor %}
    </div>
    <div class="mt-4">
        <div class="d-flex justify-content-between mb-3">
            <span class="h5">Total</span>
            <span class="h5 text-primary fw-bold">KES {{ cart.get_total_price }}</span>
        </div>
        <a href="{% url 'cart:cart_detail' %}" class="btn btn-primary w-100 mb-2">View Full Cart</a>
        <a href="{% url 'orders:order_create' %}" class="btn btn-outline-dark w-100">Checkout</a>
    </div>
{% else %}
    <div class="text-center py-5">
        <i class="bi bi-cart-x display-1 text-muted"></i>
        <p class="mt-3">Your cart is currently empty.</p>
    </div>
{% endif %}
